b2w_nav_node:
  ros__parameters:
    min_move_distance_for_yaw: 1.2         # 增加距离提高方向估计精度
    initial_move_speed: 0.9                # 
    min_speed_for_cog: 0.3                 # COG 校正最小速度阈值
    min_distance_for_cog: 0.5              # COG 校正最小距离值
    heading_alignment_threshold: 0.25       # 弧度
    moving_to_target_forward_speed: 0.9    # 作业时的前进速度
    z1_arm_end_height: 0.0                 # 机械臂末端移动高度
    arm_offset_x: 0.3487                   # 机械臂urdf offset x
    arrive_distance: 0.8                   # 机器狗到达目标点的阈值
    calibration_duration: 5.0              # imu静态标定时间
    imu_k_correction_error: 0.01           # imu零偏矫正增益系数  0.003 ?
    imu_gyro_z_threshold: 0.04             # imu角速度阈值，小于该值才能进行 COG 校正  0.02~0.04区间
    enable_correctYawBias: true            # 默认先关闭 correctYawBias ,观察纯imu的积分误差
    rtk_hz: 10                             # 默认为2hz，建议改成10hz
    distance_to_slow_down: 2.5             # 小于该距离，减速前进
    shift_letf_vy: 0.5                     # 绕障时向左平移的速度
    shift_letf_diatance: 0.8               # 绕障距离
    min_useful_vyaw: 0.4                   # b2w最小有效角速度
    use_rtk_tilt_compensation: true        # 是否开启斜坡投影补偿
    rtk_systematic_x_bias: 0.0             # 目前不确定是x 还是 y 补偿系统偏差
    rtk_systematic_y_bias: 0.0